<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conveyor Idle Factory</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      text-align: center;
      background: #0f1115;
      color: #e6e6e6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 10px;
    }

    canvas {
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      margin: 15px;
      background: #151922;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    .conveyorUI {
      background: #161a22;
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      margin: 10px;
      padding: 12px 14px;
      display: inline-block;
      min-width: 180px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    button {
      margin: 4px;
      padding: 7px 12px;
      border-radius: 10px;
      border: 1px solid #2a2f3a;
      background: #1c2230;
      color: #e6e6e6;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover {
      background: #273149;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0px);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #unlockBtn {
      background: #2b6fff;
      border: none;
      font-weight: 600;
    }

    #unlockBtn:hover {
      background: #3b7dff;
    }

    #ui {
      margin-top: 10px;
    }

    p {
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Conveyor Factory Idle</h1>

  <div>Coins: <span id="coins">0</span></div>
  <div>Coins/sec: <span id="cps">0</span></div>

  <button id="unlockBtn" type="button" onclick="unlockConveyor()">
    Unlock Conveyor
  </button>

  <br>
  <canvas id="game" width="600" height="300"></canvas>
  <br>
  <div id="ui"></div>

  <br><br>
  <p>Warning: the delete save button below will permanently erase your progress.</p>
  <button type="button" onclick="resetSave()">Delete Save</button>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let coins = 0;
    let conveyors = [];
    let lastAffordableState = "";
    let uiDirty = true;

    const MIN_DELAY = 500;
    const LANE_HEIGHT = 60;
    const MAX_ITEMS = 25;
    const MAX_CONVEYORS = 6;

    let coinHistory = [];

    function updateCPS() {
      const now = performance.now();

      coinHistory.push({ t: now, c: coins });

      // keep last 5 seconds
      coinHistory = coinHistory.filter(p => now - p.t <= 5000);

      if (coinHistory.length < 2) return 0;

      const a = coinHistory[0];
      const b = coinHistory[coinHistory.length - 1];

      const cps = (b.c - a.c) / ((b.t - a.t) / 1000);
      return Math.max(0, cps);
    }

    // ---------------- ITEM ----------------
    class Item {
      constructor(x, conveyor) {
        this.x = x;
        this.conveyor = conveyor;
        this.size = 18;
      }

      draw() {
        ctx.fillStyle = "orange";
        ctx.fillRect(this.x, this.conveyor.y, this.size, this.size);
      }
    }

    // ---------------- CONVEYOR ----------------
    class Conveyor {
      constructor(tier) {
        this.tier = tier;
        this.y = (tier - 1) * LANE_HEIGHT;

        this.baseSpeed = 1 + (tier - 1) * 0.2;
        this.speedBoost = 0;
        this.speed = this.baseSpeed;

        this.items = [new Item(0, this)];

        this.speedCost = 10 * Math.pow(3, tier - 1);
        this.itemCost = 25 * Math.pow(3, tier - 1);
        this.itemValue = 5 * Math.pow(2.5, tier - 1);

        this.autobuyerUnlocked = false;
        this.autobuyerOwned = false;
        this.autobuyerDelay = 10000;
        this.autobuyerTimer = 0;
        this.autobuyerLevel = 0;
        this.autobuyerBulk = 1;

        // ---------------- NEW ITEM SYSTEM STATE ----------------
        this.upgradeCounter = 0;
        this.itemSpawnThreshold = 5;
      }

      update(dt) {
        const delta = dt / 1000;

        this.speedBoost *= 0.97;
        this.speed = this.baseSpeed + this.speedBoost;

        let producedThisFrame = 0;

        for (let item of this.items) {
          item.x += this.speed * delta * 60;

          if (item.x > canvas.width) {
            coins += this.itemValue;
            producedThisFrame += this.itemValue;

            flashGain(this.itemValue);
            item.x = -20;
          }
        }

        this.coinsProduced += producedThisFrame;

        // --- CPS tracking per conveyor (smoothed) ---
        this.lastCoinsProduced += (this.coinsProduced - this.lastCoinsProduced) * 0.1;
        this.cps = this.lastCoinsProduced * (1000 / 1000); // approx per second

        if (this.autobuyerOwned) {
          this.autobuyerTimer += dt;

          if (this.autobuyerTimer >= this.autobuyerDelay) {
            this.autobuyerTimer = 0;

            let didBuy = false;

            for (let i = 0; i < this.autobuyerBulk; i++) {
              if (coins >= this.speedCost) {
                buySpeedUpgrade(this);
                didBuy = true;
              } else if (coins >= this.itemCost) {
                buyItemUpgrade(this);
                didBuy = true;
              }
            }

            if (didBuy) renderUI();
          }
        }
      }
    }

    conveyors.push(new Conveyor(1));

    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseY = e.clientY - rect.top;

      for (let i = 0; i < conveyors.length; i++) {
        const c = conveyors[i];

        const laneTop = c.y;
        const laneBottom = c.y + LANE_HEIGHT;

        if (mouseY >= laneTop && mouseY <= laneBottom) {
          // temporary speed boost
          c.speedBoost += 0.6;

          // clamp so it doesn't explode visually
          if (c.speedBoost > 10) c.speedBoost = 10;

          break;
        }
      }
    });
    // ---------------- FUNCTIONS (GLOBAL FIX) ----------------

    window.unlockConveyor = function () {
      if (conveyors.length >= MAX_CONVEYORS) return;

      let cost = 100 * Math.pow(4, conveyors.length - 1);

      if (coins >= cost) {
        coins -= cost;

        let c = new Conveyor(conveyors.length + 1);
        conveyors.push(c);

        if (conveyors.length > 1) {
          conveyors[conveyors.length - 2].autobuyerUnlocked = true;
        }

        uiDirty = true;
      }
    };

    window.buySpeedUpgrade = function (c) {
      if (coins >= c.speedCost) {
        coins -= c.speedCost;
        c.baseSpeed += 0.4;
        c.speedCost = Math.floor(c.speedCost * 1.45);
        uiDirty = true;
      }
    };

    window.buyItemUpgrade = function (c) {
      if (coins >= c.itemCost) {
        coins -= c.itemCost;

        c.itemValue *= 1.25;
        c.itemCost = Math.floor(c.itemCost * 1.55);

        // ---------------- NEW DETERMINISTIC ITEM SYSTEM ----------------
        c.upgradeCounter++;

        if (c.items.length < MAX_ITEMS) {
          if (c.upgradeCounter >= c.itemSpawnThreshold) {

            c.upgradeCounter = 0;

            c.items.push(new Item(Math.random() * -200, c));

            // slowly reduce threshold (faster item growth over time)
            if (c.itemSpawnThreshold > 2) {
              c.itemSpawnThreshold -= 0.2;
            }
          }
        }
        // --------------------------------------------------------------

        uiDirty = true;
      }
    };

    window.buyAutobuyer = function (c) {
      let cost = Math.floor(200 * Math.pow(3.3, c.tier - 1));
      if (coins >= cost) {
        coins -= cost;
        c.autobuyerOwned = true;
        uiDirty = true;
      }
    };

    window.upgradeAutobuyer = function (c) {
      let cost = Math.floor(150 * Math.pow(1.85, c.autobuyerLevel));
      if (coins >= cost) {
        coins -= cost;
        c.autobuyerLevel++;

        if (c.autobuyerDelay > MIN_DELAY) {
          c.autobuyerDelay *= 0.9;
          if (c.autobuyerDelay < MIN_DELAY) {
            c.autobuyerDelay = MIN_DELAY;
          }
        } else {
          c.autobuyerBulk++;
        }

        uiDirty = true;
      }
    };

    function flashGain(amount) {
      const el = document.createElement("div");
      el.innerText = `+${fmt(amount)}`;
      el.style.position = "fixed";
      el.style.left = "50%";
      el.style.top = "40%";
      el.style.transform = "translateX(-50%)";
      el.style.color = "gold";
      el.style.fontSize = "18px";
      el.style.pointerEvents = "none";
      el.style.transition = "0.4s ease";
      el.style.opacity = "1";

      document.body.appendChild(el);

      requestAnimationFrame(() => {
        el.style.transform = "translateX(-50%) translateY(-20px)";
        el.style.opacity = "0";
      });

      setTimeout(() => el.remove(), 450);
    }
    function fmt(n) {
      if (!isFinite(n)) return "∞";

      const abs = Math.abs(n);

      if (abs < 1000) return Math.floor(n).toString();

      const units = [
        "K", "M", "B", "T",
        "Qa", "Qi", "Sx", "Sp",
        "Oc", "No", "Dc"
      ];

      let tier = Math.floor(Math.log10(abs) / 3);

      if (tier <= 0) return Math.floor(n).toString();
      if (tier > units.length) {
        return n.toExponential(2);
      }

      const scaled = n / Math.pow(1000, tier);
      return scaled.toFixed(2).replace(/\.00$/, "") + units[tier - 1];
    }

    function getAffordableState() {
      let state = coins >= (100 * Math.pow(4, conveyors.length - 1));

      for (let c of conveyors) {
        state += "|" + (coins >= c.speedCost);
        state += "|" + (coins >= c.itemCost);

        if (c.autobuyerUnlocked && !c.autobuyerOwned) {
          state += "|" + (coins >= Math.floor(200 * Math.pow(3.3, c.tier - 1)));
        }

        if (c.autobuyerOwned) {
          state += "|" + (coins >= Math.floor(150 * Math.pow(1.85, c.autobuyerLevel)));
        }
      }

      return state;
    }

    window.resetSave = function () {
      if (confirm("Delete save?")) {
        localStorage.removeItem("factorySave");
        location.reload();
      }
    };

    function saveGame() {
      const data = {
        version: 1,
        coins: coins,
        conveyors: conveyors.map(c => ({
          tier: c.tier,
          y: c.y,

          baseSpeed: c.baseSpeed,
          speedBoost: c.speedBoost,

          speedCost: c.speedCost,
          itemCost: c.itemCost,
          itemValue: c.itemValue,

          autobuyerUnlocked: c.autobuyerUnlocked,
          autobuyerOwned: c.autobuyerOwned,

          autobuyerDelay: c.autobuyerDelay,
          autobuyerTimer: c.autobuyerTimer,

          autobuyerLevel: c.autobuyerLevel,
          autobuyerBulk: c.autobuyerBulk,

          items: c.items.map(i => ({
            x: i.x
          }))
        }))
      };

      localStorage.setItem("factorySave", JSON.stringify(data));
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem("factorySave");
        if (!raw) return;

        const save = JSON.parse(raw);

        let version = save.version || 0;

        coins = save.coins || 0;
        conveyors = [];

        // ---------------- VERSION MIGRATION ----------------
        if (version < 1) {
          console.warn("Upgrading save v0 → v1");
          save.version = 1;
          save.conveyors = save.conveyors || [];
        }

        const saved = save.conveyors || [];

        // ---------------- LOAD + VALIDATE ----------------
        for (let c of saved) {
          const newC = new Conveyor(c.tier);

          newC.y = c.y;

          newC.baseSpeed = c.baseSpeed ?? newC.baseSpeed;
          newC.speedBoost = c.speedBoost ?? 0;

          newC.speedCost = c.speedCost ?? newC.speedCost;
          newC.itemCost = c.itemCost ?? newC.itemCost;
          newC.itemValue = c.itemValue ?? newC.itemValue;

          newC.autobuyerUnlocked = !!c.autobuyerUnlocked;
          newC.autobuyerOwned = !!c.autobuyerOwned;

          newC.autobuyerDelay = c.autobuyerDelay ?? newC.autobuyerDelay;
          newC.autobuyerTimer = c.autobuyerTimer ?? 0;

          newC.autobuyerLevel = c.autobuyerLevel ?? 0;
          newC.autobuyerBulk = c.autobuyerBulk ?? 1;

          newC.items = (c.items || []).map(i => new Item(i.x, newC));

          conveyors.push(newC);

          // ---------------- HARD SAFETY CAP ----------------
          // HARD ENFORCE MAX CONVEYORS AFTER LOAD
          if (conveyors.length > MAX_CONVEYORS) {
            conveyors.length = MAX_CONVEYORS;
          }

          // ---------------- ENSURE VALID STATE ----------------
          if (conveyors.length === 0) {
            conveyors.push(new Conveyor(1));
          }

          // ---------------- CLEAN INVALID EXCESS STATE ----------------
          // (important for future version changes or corrupted saves)
          conveyors = conveyors.slice(0, MAX_CONVEYORS);
        }
      } catch (e) {
        console.warn("Save load failed:", e);
        conveyors = [new Conveyor(1)];
      }
    }

    loadGame();
    setInterval(saveGame, 5000);

    // ---------------- UI ----------------
    function renderUI() {
      uiDirty = false;

      const ui = document.getElementById("ui");
      ui.innerHTML = "";

      const unlockBtn = document.getElementById("unlockBtn");

      const max = MAX_CONVEYORS;
      const atCap = conveyors.length >= max;

      const nextCost = atCap ? 0 : 100 * Math.pow(4, conveyors.length - 1);
      const remaining = atCap ? 0 : Math.max(0, nextCost - coins);

      // ---------------- PROGRESSION GOAL DISPLAY ----------------
      const goalDiv = document.createElement("div");
      goalDiv.style.margin = "10px";
      goalDiv.style.opacity = "0.85";
      goalDiv.innerHTML = atCap
        ? `Max progression reached`
        : `
          Next Conveyor:<br>
          <b>${fmt(remaining)}</b> coins needed
          <div style="opacity:0.6;font-size:12px;margin-top:4px">
            Progress feel: ${Math.max(0, Math.min(100, (coins / nextCost) * 100)).toFixed(0)}%
          </div>
        `;

      ui.appendChild(goalDiv);

      // ---------------- UNLOCK BUTTON ----------------
      unlockBtn.disabled = atCap || coins < nextCost;
      unlockBtn.innerText = atCap
        ? `Max Conveyors Reached (${max})`
        : `Unlock Conveyor (${fmt(nextCost)})`;

      // ---------------- CONVEYOR UI ----------------
      conveyors.forEach((c, i) => {
        const div = document.createElement("div");
        div.className = "conveyorUI";

        const canBuySpeed = coins >= c.speedCost;
        const canBuyItem = coins >= c.itemCost;

        div.innerHTML = `
          <b>Conveyor ${c.tier}</b><br><br>

          Value: ${fmt(c.itemValue)} → ${fmt(c.itemValue * 1.25)} (+25%)<br>
          Speed: ${c.baseSpeed.toFixed(1)} → ${(c.baseSpeed + 0.4).toFixed(1)} (+0.4)<br>
          Income: ~${fmt((c.itemValue * c.items.length) / 3)}/s<br><br>

          <button type="button"
            onclick="buySpeedUpgrade(conveyors[${i}])"
            ${canBuySpeed ? "" : "disabled"}>
            Speed (${fmt(c.speedCost)})
          </button>

          <button type="button"
            onclick="buyItemUpgrade(conveyors[${i}])"
            ${canBuyItem ? "" : "disabled"}>
            Value (${fmt(c.itemCost)})
          </button>
        `;

        if (c.autobuyerUnlocked) {
          if (!c.autobuyerOwned) {
            const cost = Math.floor(200 * Math.pow(3.3, c.tier - 1));

            div.innerHTML += `
          <br><br>
          <button type="button"
            onclick="buyAutobuyer(conveyors[${i}])"
            ${coins >= cost ? "" : "disabled"}>
            Buy Autobuyer (${fmt(cost)})
          </button>
        `;
          } else {
            const cost = Math.floor(150 * Math.pow(1.85, c.autobuyerLevel));

            div.innerHTML += `
          <br><br>
          Autobuyer: ${(c.autobuyerDelay / 1000).toFixed(2)}s<br>
          Bulk: ${c.autobuyerBulk}<br>

          <button type="button"
            onclick="upgradeAutobuyer(conveyors[${i}])"
            ${coins >= cost ? "" : "disabled"}>
            Upgrade (${fmt(cost)})
          </button>
        `;
          }
        }

        ui.appendChild(div);
      });
    }

    // ---------------- LOOP ----------------
    let lastTime = performance.now();

    function loop(now) {
      let dt = now - lastTime;
      lastTime = now;

      conveyors.forEach(c => c.update(dt));

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      conveyors.forEach(c => {
        ctx.fillStyle = "#ddd";
        ctx.fillRect(0, c.y + 10, canvas.width, 10);
        c.items.forEach(item => item.draw());
      });

      document.getElementById("coins").innerText = fmt(coins);
      document.getElementById("cps").innerText = fmt(updateCPS().toFixed(1));

      // ---------------- UI LOGIC FIX ----------------
      const currentState = getAffordableState();

      if (uiDirty || currentState !== lastAffordableState) {
        renderUI();
        lastAffordableState = currentState;
      }

      requestAnimationFrame(loop);
    }

    renderUI();
    loop(performance.now());
  </script>

</body>

</html>
